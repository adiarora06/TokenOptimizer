<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Token Optimizer Prompt History</title>
  <script>
    document.documentElement.dataset.theme = localStorage.getItem("tokenOptimizerTheme") || "light";
  </script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fb;
      --panel: #ffffff;
      --text: #18202f;
      --muted: #677084;
      --line: #dfe4ee;
      --brand: #2557d6;
      --brand-soft: #eaf0ff;
      --good: #0b7a4b;
      --shadow: 0 10px 30px rgba(24, 32, 47, 0.08);
    }

    :root[data-theme="dark"] {
      color-scheme: dark;
      --bg: #0b0f14;
      --panel: #111827;
      --text: #ffffff;
      --muted: #d1d5db;
      --line: #374151;
      --brand: #3b82f6;
      --brand-soft: #172554;
      --good: #22c55e;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.4;
      padding-top: 45px;
    }

    button,
    input {
      font: inherit;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .topbar {
      position: sticky;
      top: 45px;
      z-index: 10;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      min-height: 58px;
      padding: 10px 24px;
      background: rgba(255, 255, 255, 0.96);
      border-bottom: 1px solid var(--line);
      box-shadow: 0 8px 24px rgba(24, 32, 47, 0.08);
      backdrop-filter: blur(12px);
    }

    .page-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 20;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      padding: 10px 24px;
      background: rgba(247, 248, 251, 0.96);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(12px);
    }

    .page-nav a {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #ffffff;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      padding: 7px 11px;
      text-decoration: none;
    }

    .page-nav a[aria-current="page"] {
      border-color: var(--brand);
      background: var(--brand);
      color: #ffffff;
    }

    :root[data-theme="dark"] .page-nav,
    :root[data-theme="dark"] .topbar {
      background: rgba(11, 15, 20, 0.96);
    }

    :root[data-theme="dark"] .panel,
    :root[data-theme="dark"] .page-nav a,
    :root[data-theme="dark"] button,
    :root[data-theme="dark"] .button,
    :root[data-theme="dark"] .history-card,
    :root[data-theme="dark"] .audit-card {
      background: var(--panel);
      border-color: var(--line);
      color: var(--text);
    }

    :root[data-theme="dark"] .meta span {
      background: #1f2937;
      color: var(--muted);
    }

    .brand,
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .actions {
      justify-content: flex-end;
    }

    .logo {
      display: grid;
      width: 36px;
      height: 36px;
      place-items: center;
      border-radius: 8px;
      background: var(--brand);
      color: #ffffff;
      font-weight: 900;
    }

    .brand strong,
    .status strong {
      display: block;
      overflow: hidden;
      color: var(--text);
      font-size: 13px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .brand span,
    .status span {
      display: block;
      overflow: hidden;
      color: var(--muted);
      font-size: 12px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .page {
      width: min(1180px, calc(100% - 36px));
      margin: 0 auto;
      padding: 22px 0 44px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .history-shell {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(300px, 0.38fr);
      gap: 14px;
      align-items: start;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 16px;
      border-bottom: 1px solid var(--line);
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      font-size: 22px;
    }

    p {
      color: var(--muted);
    }

    .button,
    button {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
      font-weight: 800;
      padding: 8px 11px;
    }

    .button.active {
      border-color: var(--brand);
      background: var(--brand);
      color: #ffffff;
    }

    .history-list {
      display: grid;
      gap: 10px;
      padding: 16px;
    }

    .history-card,
    .audit-card {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      padding: 12px;
    }

    .audit-panel {
      position: sticky;
      top: 118px;
    }

    .audit-list {
      display: grid;
      gap: 10px;
      max-height: calc(100vh - 190px);
      overflow: auto;
      padding: 16px;
    }

    .audit-card {
      grid-template-columns: 1fr;
      box-shadow: none;
    }

    .history-card strong,
    .audit-card strong {
      display: block;
      font-size: 14px;
    }

    .history-card p,
    .audit-card p {
      margin-top: 5px;
      font-size: 12px;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 9px;
    }

    .meta span {
      border-radius: 999px;
      padding: 4px 7px;
      background: #eef1f7;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }

    details {
      margin-top: 8px;
      border-top: 1px solid var(--line);
      padding-top: 8px;
    }

    summary {
      cursor: pointer;
      font-size: 12px;
      font-weight: 900;
    }

    pre {
      overflow: auto;
      max-height: 220px;
      margin: 10px 0 0;
      border-radius: 8px;
      background: #111827;
      color: #f9fafb;
      padding: 12px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .empty {
      display: grid;
      min-height: 340px;
      place-items: center;
      text-align: center;
      color: var(--muted);
      padding: 16px;
    }

    @media (max-width: 900px) {
      .topbar,
      .history-shell,
      .history-card {
        grid-template-columns: 1fr;
      }

      .audit-panel {
        position: static;
      }

      .audit-list {
        max-height: none;
      }

      .actions {
        justify-content: flex-start;
      }
    }
  </style>
  <link rel="stylesheet" href="/vendor/tabler/tabler-icons.min.css">
  <link rel="stylesheet" href="/app-nav.css">
</head>
<body class="has-app-nav">
  <nav class="app-topbar" aria-label="Primary navigation">
    <a class="app-brand" href="/" aria-label="Token Optimizer home"><span class="app-brand-mark" aria-hidden="true">T</span><strong>Token Optimizer</strong></a>
    <div class="app-primary-nav">
      <a href="/workspace">Workspace</a>
      <a href="/prompt-history" aria-current="page">Runs</a>
      <a href="/stats">Insights</a>
      <a href="/agent-structure">Architecture</a>
    </div>
    <a class="app-settings" href="/settings" aria-label="Settings" title="Settings"><i class="ti ti-settings" aria-hidden="true"></i></a>
  </nav>

  <main class="page">
    <div class="history-shell">
      <section class="panel">
        <div class="panel-header">
          <div>
            <h1>Prompt History</h1>
            <p id="statusDetail">No prompts stored in this browser yet.</p>
          </div>
          <div class="actions">
            <button id="exportHistory">Copy History</button>
            <button id="clearHistory">Clear All</button>
          </div>
        </div>
        <div id="historyList" class="history-list"></div>
      </section>

      <aside class="panel audit-panel" aria-label="Audit log">
        <div class="panel-header">
          <div>
            <h2>Audit Log</h2>
            <p id="auditSummary">No runs yet.</p>
          </div>
          <div class="actions">
            <button id="copyAudit">Copy</button>
            <button id="clearAudit">Clear</button>
          </div>
        </div>
        <div id="auditList" class="audit-list"></div>
      </aside>
    </div>
  </main>

  <script>
    const historyKey = "tokenOptimizerPromptHistory";
    const auditKey = "tokenOptimizerAuditLog";
    const providerLabels = {
      "groq-openai-fallback": "Auto",
      groq: "Auto",
      openai: "Auto",
      offline: "Fallback",
      fallback: "Fallback",
      contract: "Contract",
      openrouter: "Custom",
      xai: "Custom",
      litellm: "Custom"
    };
    const platformNames = {
      codex: "Codex",
      webapp: "Web app",
      extension: "Extension",
      desktop: "Desktop",
      sdk: "SDK",
      team: "Team"
    };

    const el = (id) => document.getElementById(id);

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function loadHistory() {
      try {
        const parsed = JSON.parse(localStorage.getItem(historyKey) || "[]");
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function saveHistory(items) {
      localStorage.setItem(historyKey, JSON.stringify(items));
    }

    function loadAudit() {
      try {
        const parsed = JSON.parse(localStorage.getItem(auditKey) || "[]");
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function saveAudit(items) {
      localStorage.setItem(auditKey, JSON.stringify(items));
    }

    function title(goal) {
      const compact = String(goal || "").replace(/\s+/g, " ").trim();
      return compact.length > 88 ? compact.slice(0, 85) + "..." : compact || "Untitled prompt";
    }

    function promptText(item) {
      return String(item?.prompt || item?.goal || "").trim();
    }

    function fmtDate(value) {
      const date = new Date(value);
      return Number.isNaN(date.getTime()) ? "Unknown time" : date.toLocaleString();
    }

    function sendPrompt(destination, item) {
      const prompt = promptText(item);
      const payload = { prompt, goal: prompt };
      if (destination === "workspace") {
        localStorage.setItem("tokenOptimizerLandingInput", JSON.stringify(payload));
        window.location.href = "/workspace";
        return;
      }
      localStorage.setItem("tokenOptimizerStructureInput", JSON.stringify({
        ...item,
        view: "agents"
      }));
      window.location.href = "/agent-structure";
    }

    function traceText(item) {
      const trace = item.phases?.length ? item.phases : [];
      return trace.length
        ? trace.map((step, index) => `${index + 1}. ${step.agent || "Agent"} - ${step.detail || step.phase || "Processed state."}`).join("\n")
        : "No trace steps recorded.";
    }

    function renderAudit() {
      const audit = loadAudit();
      el("auditSummary").textContent = audit.length ? `${audit.length} saved run${audit.length === 1 ? "" : "s"}` : "No runs yet.";
      if (!audit.length) {
        el("auditList").innerHTML = `
          <div class="empty">
            <div>
              <strong>No audit entries yet.</strong>
              <p>Run a prompt in the workspace and the audit trail will appear here.</p>
            </div>
          </div>
        `;
        return;
      }
      el("auditList").innerHTML = audit.slice(0, 12).map((item) => {
        const savings = item.savingsPercent == null ? "n/a" : item.savingsPercent + "% est.";
        const inputTokens = item.actualInputTokens || item.rawTokens || 0;
        const outputTokens = item.actualOutputTokens || item.optimizedTokens || 0;
        return `
          <article class="audit-card">
            <div>
              <strong>${escapeHtml(item.title || "Untitled run")}</strong>
              <p>${escapeHtml(fmtDate(item.createdAt))}</p>
              <div class="meta">
                <span>${escapeHtml(item.mode || "mode")}</span>
                <span>${escapeHtml(item.provider || "route")}</span>
                <span>${escapeHtml(item.status || "status")}</span>
                <span>${inputTokens} input</span>
                <span>${outputTokens} output</span>
                <span>${savings} context reduction</span>
                <span>${item.elapsedMs ? Math.round(item.elapsedMs / 100) / 10 + "s" : "time n/a"}</span>
              </div>
              <details>
                <summary>Trace</summary>
                <pre>${escapeHtml(traceText(item))}</pre>
              </details>
            </div>
          </article>
        `;
      }).join("");
    }

    function render() {
      const history = loadHistory();
      el("statusDetail").textContent = `${history.length} saved prompt${history.length === 1 ? "" : "s"} in this browser.`;
      if (!history.length) {
        el("historyList").innerHTML = `
          <div class="empty">
            <div>
              <strong>No prompts saved yet.</strong>
              <p>Run a prompt on the optimizer page and it will appear here.</p>
            </div>
          </div>
        `;
        renderAudit();
        return;
      }
      el("historyList").innerHTML = history.map((item) => `
        <article class="history-card">
          <div>
            <strong>${escapeHtml(title(promptText(item)))}</strong>
            <p>${escapeHtml(promptText(item))}</p>
            <div class="meta">
              <span>${escapeHtml(item.mode || "workspace")}</span>
              <span>${escapeHtml(item.route || providerLabels[item.provider] || item.provider || "automatic")}</span>
              <span>${escapeHtml(item.status || "saved")}</span>
              <span>${item.tokens || Math.ceil(promptText(item).length / 4)} tokens</span>
              <span>${escapeHtml(new Date(item.createdAt || Date.now()).toLocaleString())}</span>
            </div>
          </div>
          <div class="actions">
            <button data-action="workspace" data-id="${item.id}">Open in Workspace</button>
            <button data-action="agents" data-id="${item.id}">View Route</button>
            <button data-action="delete" data-id="${item.id}">Delete</button>
          </div>
        </article>
      `).join("");
      renderAudit();
    }

    el("historyList").addEventListener("click", (event) => {
      const button = event.target.closest("button[data-action]");
      if (!button) return;
      const history = loadHistory();
      const item = history.find((entry) => entry.id === button.dataset.id);
      if (!item) return;
      if (button.dataset.action === "delete") {
        saveHistory(history.filter((entry) => entry.id !== item.id));
        render();
        return;
      }
      sendPrompt(button.dataset.action, item);
    });

    el("clearHistory").addEventListener("click", () => {
      if (!window.confirm("Clear all saved prompts from this browser?")) return;
      saveHistory([]);
      render();
    });

    el("exportHistory").addEventListener("click", async () => {
      const history = loadHistory();
      const text = history.length
        ? history.map((item, index) => `${index + 1}. ${title(promptText(item))}\n${promptText(item)}`).join("\n\n")
        : "No saved prompts.";
      await navigator.clipboard.writeText(text);
      el("exportHistory").textContent = "Copied";
      setTimeout(() => {
        el("exportHistory").textContent = "Copy History";
      }, 1000);
    });

    el("copyAudit").addEventListener("click", async () => {
      const audit = loadAudit();
      const text = audit.length
        ? audit.map((item, index) => [
          `${index + 1}. ${item.title || "Untitled run"}`,
          `Mode: ${item.mode || "n/a"}`,
          `Route: ${item.provider || "n/a"}`,
          `Status: ${item.status || "n/a"}`,
          `Input tokens: ${item.actualInputTokens || item.rawTokens || 0}`,
          `Output tokens: ${item.actualOutputTokens || item.optimizedTokens || 0}`,
          `Estimated context reduction: ${item.savingsPercent == null ? "n/a" : item.savingsPercent + "%"}`,
          traceText(item)
        ].join("\n")).join("\n\n")
        : "No audit entries.";
      await navigator.clipboard.writeText(text);
      el("copyAudit").textContent = "Copied";
      setTimeout(() => {
        el("copyAudit").textContent = "Copy";
      }, 1000);
    });

    el("clearAudit").addEventListener("click", () => {
      if (!window.confirm("Clear the local audit log?")) return;
      saveAudit([]);
      renderAudit();
    });

    render();
  </script>
</body>
</html>
