<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Token Optimizer Prompt History</title>
  <script>
    document.documentElement.dataset.theme = localStorage.getItem("tokenOptimizerTheme") || "light";
  </script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fb;
      --panel: #ffffff;
      --text: #18202f;
      --muted: #677084;
      --line: #dfe4ee;
      --brand: #2557d6;
      --brand-soft: #eaf0ff;
      --good: #0b7a4b;
      --good-soft: #e8f6ef;
      --danger: #b42318;
      --danger-soft: #fff0ee;
      --warning: #9a6700;
      --surface-soft: #f5f7fb;
      --shadow: 0 10px 30px rgba(24, 32, 47, 0.08);
    }

    :root[data-theme="dark"] {
      color-scheme: dark;
      --bg: #0b0f14;
      --panel: #111827;
      --text: #ffffff;
      --muted: #d1d5db;
      --line: #374151;
      --brand: #3b82f6;
      --brand-soft: #172554;
      --good: #22c55e;
      --good-soft: #123224;
      --danger: #f87171;
      --danger-soft: #3b171b;
      --warning: #fbbf24;
      --surface-soft: #182130;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.4;
      padding-top: 45px;
    }

    button,
    input {
      font: inherit;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .topbar {
      position: sticky;
      top: 45px;
      z-index: 10;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      min-height: 58px;
      padding: 10px 24px;
      background: rgba(255, 255, 255, 0.96);
      border-bottom: 1px solid var(--line);
      box-shadow: 0 8px 24px rgba(24, 32, 47, 0.08);
      backdrop-filter: blur(12px);
    }

    .page-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 20;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      padding: 10px 24px;
      background: rgba(247, 248, 251, 0.96);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(12px);
    }

    .page-nav a {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #ffffff;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      padding: 7px 11px;
      text-decoration: none;
    }

    .page-nav a[aria-current="page"] {
      border-color: var(--brand);
      background: var(--brand);
      color: #ffffff;
    }

    :root[data-theme="dark"] .page-nav,
    :root[data-theme="dark"] .topbar {
      background: rgba(11, 15, 20, 0.96);
    }

    :root[data-theme="dark"] .panel,
    :root[data-theme="dark"] .page-nav a,
    :root[data-theme="dark"] button,
    :root[data-theme="dark"] .button,
    :root[data-theme="dark"] .history-card,
    :root[data-theme="dark"] .audit-card {
      background: var(--panel);
      border-color: var(--line);
      color: var(--text);
    }

    :root[data-theme="dark"] .meta span {
      background: #1f2937;
      color: var(--muted);
    }

    .brand,
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .actions {
      justify-content: flex-end;
    }

    .logo {
      display: grid;
      width: 36px;
      height: 36px;
      place-items: center;
      border-radius: 8px;
      background: var(--brand);
      color: #ffffff;
      font-weight: 900;
    }

    .brand strong,
    .status strong {
      display: block;
      overflow: hidden;
      color: var(--text);
      font-size: 13px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .brand span,
    .status span {
      display: block;
      overflow: hidden;
      color: var(--muted);
      font-size: 12px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .page {
      width: min(1180px, calc(100% - 36px));
      margin: 0 auto;
      padding: 22px 0 44px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .history-shell {
      display: grid;
      grid-template-columns: minmax(0, 0.9fr) minmax(430px, 1.1fr);
      gap: 14px;
      align-items: start;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 16px;
      border-bottom: 1px solid var(--line);
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      font-size: 22px;
    }

    p {
      color: var(--muted);
    }

    .button,
    button {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
      font-weight: 800;
      padding: 8px 11px;
    }

    .button.active {
      border-color: var(--brand);
      background: var(--brand);
      color: #ffffff;
    }

    .history-list {
      display: grid;
      gap: 10px;
      padding: 16px;
    }

    .history-card,
    .audit-card {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      padding: 12px;
    }

    .history-card .actions {
      justify-content: flex-start;
    }

    .audit-panel {
      position: sticky;
      top: 118px;
    }

    .audit-list {
      display: grid;
      gap: 10px;
      max-height: calc(100vh - 190px);
      overflow: auto;
      padding: 16px;
    }

    .audit-card {
      grid-template-columns: 1fr;
      gap: 10px;
      box-shadow: none;
    }

    .audit-card[data-outcome="failed"] { border-color: color-mix(in srgb, var(--danger) 38%, var(--line)); }

    .audit-card-head,
    .audit-outcome,
    .trace-row,
    .agent-action-head,
    .agent-action-meta {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .audit-card-head { justify-content: space-between; }
    .audit-outcome { font-size: 12px; font-weight: 900; }
    .outcome-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--good); }
    [data-outcome="failed"] .audit-outcome { color: var(--danger); }
    [data-outcome="failed"] .outcome-dot { background: var(--danger); }
    [data-outcome="cancelled"] .audit-outcome { color: var(--warning); }
    [data-outcome="cancelled"] .outcome-dot { background: var(--warning); }
    .run-duration { color: var(--muted); font-size: 11px; font-weight: 800; font-variant-numeric: tabular-nums; }

    .trace-row {
      justify-content: space-between;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--surface-soft);
      padding: 7px 8px;
    }

    .trace-row code { overflow: hidden; color: var(--muted); font-size: 11px; text-overflow: ellipsis; white-space: nowrap; }
    .trace-row button { min-height: 28px; flex: 0 0 auto; padding: 4px 7px; font-size: 11px; }

    .audit-metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--line);
    }

    .audit-metrics div { min-width: 0; background: var(--panel); padding: 8px; }
    .audit-metrics span { display: block; color: var(--muted); font-size: 10px; font-weight: 800; text-transform: uppercase; }
    .audit-metrics strong { margin-top: 2px; overflow: hidden; font-size: 12px; text-overflow: ellipsis; white-space: nowrap; }

    .failure-note { border-radius: 7px; background: var(--danger-soft); color: var(--danger) !important; padding: 8px 10px; }

    .history-card strong,
    .audit-card strong {
      display: block;
      font-size: 14px;
    }

    .history-card p,
    .audit-card p {
      margin-top: 5px;
      font-size: 12px;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 9px;
    }

    .meta span {
      border-radius: 999px;
      padding: 4px 7px;
      background: #eef1f7;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }

    details {
      margin-top: 8px;
      border-top: 1px solid var(--line);
      padding-top: 8px;
    }

    summary {
      cursor: pointer;
      font-size: 12px;
      font-weight: 900;
    }

    .audit-card summary { display: flex; justify-content: space-between; gap: 12px; }
    .audit-card summary span:last-child { color: var(--muted); font-weight: 750; }

    .agent-trace { display: grid; gap: 0; margin: 10px 0 0; padding: 0; list-style: none; }
    .agent-action { position: relative; display: grid; grid-template-columns: 24px minmax(0, 1fr); gap: 9px; padding-bottom: 12px; }
    .agent-action:not(:last-child)::after { position: absolute; top: 21px; bottom: 0; left: 11px; width: 1px; background: var(--line); content: ""; }
    .agent-marker { z-index: 1; display: grid; width: 24px; height: 24px; place-items: center; border: 1px solid color-mix(in srgb, var(--good) 35%, var(--line)); border-radius: 50%; background: var(--good-soft); color: var(--good); font-size: 10px; font-weight: 900; }
    .agent-action[data-status="failed"] .agent-marker { border-color: color-mix(in srgb, var(--danger) 45%, var(--line)); background: var(--danger-soft); color: var(--danger); }
    .agent-action[data-status="incomplete"] .agent-marker { border-color: color-mix(in srgb, var(--warning) 45%, var(--line)); background: var(--surface-soft); color: var(--warning); }
    .agent-action[data-status="skipped"] .agent-marker { background: var(--surface-soft); color: var(--muted); }
    .agent-action-body { min-width: 0; padding-top: 2px; }
    .agent-action-head { justify-content: space-between; align-items: flex-start; }
    .agent-action-head strong { font-size: 12px; }
    .agent-action-meta { flex-wrap: wrap; margin-top: 2px; color: var(--muted); font-size: 10px; }
    .agent-action-meta span { text-transform: capitalize; }
    .agent-action-body p { margin-top: 4px; line-height: 1.45; }

    pre {
      overflow: auto;
      max-height: 220px;
      margin: 10px 0 0;
      border-radius: 8px;
      background: #111827;
      color: #f9fafb;
      padding: 12px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .empty {
      display: grid;
      min-height: 340px;
      place-items: center;
      text-align: center;
      color: var(--muted);
      padding: 16px;
    }

    @media (max-width: 900px) {
      .topbar,
      .history-shell,
      .history-card {
        grid-template-columns: 1fr;
      }

      .audit-panel {
        position: static;
      }

      .audit-list {
        max-height: none;
      }

      .actions {
        justify-content: flex-start;
      }
    }
  </style>
  <link rel="stylesheet" href="/vendor/tabler/tabler-icons.min.css">
  <link rel="stylesheet" href="/app-nav.css">
</head>
<body class="has-app-nav">
  <nav class="app-topbar" aria-label="Primary navigation">
    <a class="app-brand" href="/" aria-label="Token Optimizer home"><span class="app-brand-mark" aria-hidden="true">T</span><strong>Token Optimizer</strong></a>
    <div class="app-primary-nav">
      <a href="/workspace">Workspace</a>
      <a href="/prompt-history" aria-current="page">Runs</a>
      <a href="/stats">Insights</a>
      <a href="/agent-structure">Architecture</a>
    </div>
    <a class="app-settings" href="/settings" aria-label="Settings" title="Settings"><i class="ti ti-settings" aria-hidden="true"></i></a>
  </nav>

  <main class="page">
    <div class="history-shell">
      <section class="panel">
        <div class="panel-header">
          <div>
            <h1>Prompt History</h1>
            <p id="statusDetail">No prompts stored in this browser yet.</p>
          </div>
          <div class="actions">
            <button id="exportHistory">Copy History</button>
            <button id="clearHistory">Clear All</button>
          </div>
        </div>
        <div id="historyList" class="history-list"></div>
      </section>

      <aside class="panel audit-panel" aria-label="Coordinator audit log">
        <div class="panel-header">
          <div>
            <h2>Coordinator Audit</h2>
            <p id="auditSummary">No runs yet.</p>
          </div>
          <div class="actions">
            <button id="copyAudit">Copy</button>
            <button id="clearAudit">Clear</button>
          </div>
        </div>
        <div id="auditList" class="audit-list"></div>
      </aside>
    </div>
  </main>

  <script>
    const historyKey = "tokenOptimizerPromptHistory";
    const auditKey = "tokenOptimizerAuditLog";
    const providerLabels = {
      "groq-openai-fallback": "Auto",
      groq: "Auto",
      openai: "Auto",
      offline: "Fallback",
      fallback: "Fallback",
      contract: "Contract",
      openrouter: "Custom",
      xai: "Custom",
      litellm: "Custom"
    };
    const platformNames = {
      codex: "Codex",
      webapp: "Web app",
      extension: "Extension",
      desktop: "Desktop",
      sdk: "SDK",
      team: "Team"
    };

    const el = (id) => document.getElementById(id);

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function loadHistory() {
      try {
        const parsed = JSON.parse(localStorage.getItem(historyKey) || "[]");
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function saveHistory(items) {
      localStorage.setItem(historyKey, JSON.stringify(items));
    }

    function loadAudit() {
      try {
        const parsed = JSON.parse(localStorage.getItem(auditKey) || "[]");
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function saveAudit(items) {
      localStorage.setItem(auditKey, JSON.stringify(items));
    }

    function title(goal) {
      const compact = String(goal || "").replace(/\s+/g, " ").trim();
      return compact.length > 88 ? compact.slice(0, 85) + "..." : compact || "Untitled prompt";
    }

    function promptText(item) {
      return String(item?.prompt || item?.goal || "").trim();
    }

    function fmtDate(value) {
      const date = new Date(value);
      return Number.isNaN(date.getTime()) ? "Unknown time" : date.toLocaleString();
    }

    function fmtDuration(value) {
      const milliseconds = Math.max(0, Number(value || 0));
      if (milliseconds < 1_000) return milliseconds ? `${Math.round(milliseconds)}ms` : "0ms";
      if (milliseconds < 60_000) return `${(milliseconds / 1_000).toFixed(milliseconds < 10_000 ? 1 : 0)}s`;
      const minutes = Math.floor(milliseconds / 60_000);
      const seconds = Math.round((milliseconds % 60_000) / 1_000);
      return `${minutes}m ${seconds}s`;
    }

    function outcomeFor(item) {
      if (item.outcome) return item.outcome;
      if (item.status === "completed" || item.status === "prompt_ready") return "succeeded";
      if (item.status === "cancelled") return "cancelled";
      return "failed";
    }

    function outcomeLabel(outcome) {
      return outcome === "succeeded" ? "Task succeeded" : outcome === "cancelled" ? "Task cancelled" : "Task failed";
    }

    function actionStatus(status) {
      if (["error", "failed", "provider_error", "cancelled"].includes(status)) return "failed";
      if (status === "skipped") return "skipped";
      if (status === "running" || status === "active") return "incomplete";
      return "succeeded";
    }

    function actionsFor(item) {
      const source = item.agentActions?.length ? item.agentActions : item.phases?.length ? item.phases : [];
      return source.map((step, index) => ({
        sequence: step.sequence || index + 1,
        agent: step.agent || "Coordinator",
        phase: step.phase || step.stage || "execute",
        status: step.status || "done",
        detail: step.detail || "Processed workflow state.",
        at: step.at || step.finishedAt || item.createdAt,
        durationMs: Number(step.durationMs || 0)
      }));
    }

    function renderAgentActions(item) {
      const actions = actionsFor(item);
      if (!actions.length) return '<p>No agent actions were recorded for this legacy run.</p>';
      return `<ol class="agent-trace">${actions.map((step) => {
        const status = actionStatus(step.status);
        return `
          <li class="agent-action" data-status="${status}">
            <span class="agent-marker">${step.sequence}</span>
            <div class="agent-action-body">
              <div class="agent-action-head"><strong>${escapeHtml(step.agent)}</strong><span class="run-duration">${escapeHtml(fmtDuration(step.durationMs))}</span></div>
              <div class="agent-action-meta"><span>${escapeHtml(step.phase)}</span><span>${escapeHtml(status)}</span><time>${escapeHtml(fmtDate(step.at))}</time></div>
              <p>${escapeHtml(step.detail)}</p>
            </div>
          </li>
        `;
      }).join("")}</ol>`;
    }

    function sendPrompt(destination, item) {
      const prompt = promptText(item);
      const payload = { prompt, goal: prompt };
      if (destination === "workspace") {
        localStorage.setItem("tokenOptimizerLandingInput", JSON.stringify(payload));
        window.location.href = "/workspace";
        return;
      }
      localStorage.setItem("tokenOptimizerStructureInput", JSON.stringify({
        ...item,
        view: "agents"
      }));
      window.location.href = "/agent-structure";
    }

    function traceText(item) {
      const trace = actionsFor(item);
      return trace.length
        ? trace.map((step, index) => `${index + 1}. [${actionStatus(step.status).toUpperCase()}] ${step.agent} / ${step.phase} / ${fmtDuration(step.durationMs)} - ${step.detail}`).join("\n")
        : "No trace steps recorded.";
    }

    function renderAudit() {
      const audit = loadAudit();
      const succeeded = audit.filter((item) => outcomeFor(item) === "succeeded").length;
      const failed = audit.filter((item) => outcomeFor(item) === "failed").length;
      el("auditSummary").textContent = audit.length ? `${audit.length} traces · ${succeeded} succeeded${failed ? ` · ${failed} failed` : ""}` : "No runs yet.";
      if (!audit.length) {
        el("auditList").innerHTML = `
          <div class="empty">
            <div>
              <strong>No audit entries yet.</strong>
              <p>Run a prompt in the workspace and the audit trail will appear here.</p>
            </div>
          </div>
        `;
        return;
      }
      el("auditList").innerHTML = audit.slice(0, 20).map((item, index) => {
        const inputTokens = item.actualInputTokens || item.rawTokens || 0;
        const outcome = outcomeFor(item);
        const traceId = item.traceId || item.id || "legacy-trace";
        const actions = actionsFor(item);
        return `
          <article class="audit-card" data-outcome="${escapeHtml(outcome)}">
            <div class="audit-card-head">
              <span class="audit-outcome"><span class="outcome-dot"></span>${escapeHtml(outcomeLabel(outcome))}</span>
              <span class="run-duration">${escapeHtml(fmtDuration(item.elapsedMs))}</span>
            </div>
            <div>
              <strong>${escapeHtml(item.title || "Untitled run")}</strong>
              <p>${escapeHtml(fmtDate(item.createdAt))}</p>
            </div>
            <div class="trace-row"><code title="${escapeHtml(traceId)}">${escapeHtml(traceId)}</code><button type="button" data-copy-trace="${escapeHtml(traceId)}">Copy ID</button></div>
            <div class="audit-metrics">
              <div><span>Route</span><strong>${escapeHtml(item.route || item.provider || "automatic")}</strong></div>
              <div><span>Model calls</span><strong>${Number(item.modelCalls || 0)}</strong></div>
              <div><span>Input tokens</span><strong>${Number(inputTokens)}</strong></div>
            </div>
            ${item.failureReason ? `<p class="failure-note">${escapeHtml(item.failureReason)}</p>` : ""}
            <details ${index === 0 ? "open" : ""}>
              <summary><span>Agent activity</span><span>${actions.length} action${actions.length === 1 ? "" : "s"}</span></summary>
              ${renderAgentActions(item)}
            </details>
          </article>
        `;
      }).join("");
    }

    function render() {
      const history = loadHistory();
      el("statusDetail").textContent = `${history.length} saved prompt${history.length === 1 ? "" : "s"} in this browser.`;
      if (!history.length) {
        el("historyList").innerHTML = `
          <div class="empty">
            <div>
              <strong>No prompts saved yet.</strong>
              <p>Run a prompt on the optimizer page and it will appear here.</p>
            </div>
          </div>
        `;
        renderAudit();
        return;
      }
      el("historyList").innerHTML = history.map((item) => `
        <article class="history-card">
          <div>
            <strong>${escapeHtml(title(promptText(item)))}</strong>
            ${title(promptText(item)) === promptText(item) ? "" : `<p>${escapeHtml(promptText(item))}</p>`}
            <div class="meta">
              <span>${escapeHtml(item.mode || "workspace")}</span>
              <span>${escapeHtml(item.route || providerLabels[item.provider] || item.provider || "automatic")}</span>
              <span>${escapeHtml(item.status || "saved")}</span>
              <span>${item.tokens || Math.ceil(promptText(item).length / 4)} tokens</span>
              <span>${escapeHtml(new Date(item.createdAt || Date.now()).toLocaleString())}</span>
            </div>
          </div>
          <div class="actions">
            <button data-action="workspace" data-id="${item.id}">Open in Workspace</button>
            <button data-action="agents" data-id="${item.id}">View Route</button>
            <button data-action="delete" data-id="${item.id}">Delete</button>
          </div>
        </article>
      `).join("");
      renderAudit();
    }

    el("historyList").addEventListener("click", (event) => {
      const button = event.target.closest("button[data-action]");
      if (!button) return;
      const history = loadHistory();
      const item = history.find((entry) => entry.id === button.dataset.id);
      if (!item) return;
      if (button.dataset.action === "delete") {
        saveHistory(history.filter((entry) => entry.id !== item.id));
        render();
        return;
      }
      sendPrompt(button.dataset.action, item);
    });

    el("auditList").addEventListener("click", async (event) => {
      const button = event.target.closest("button[data-copy-trace]");
      if (!button) return;
      await navigator.clipboard.writeText(button.dataset.copyTrace);
      button.textContent = "Copied";
      setTimeout(() => { button.textContent = "Copy ID"; }, 1000);
    });

    el("clearHistory").addEventListener("click", () => {
      if (!window.confirm("Clear all saved prompts from this browser?")) return;
      saveHistory([]);
      render();
    });

    el("exportHistory").addEventListener("click", async () => {
      const history = loadHistory();
      const text = history.length
        ? history.map((item, index) => `${index + 1}. ${title(promptText(item))}\n${promptText(item)}`).join("\n\n")
        : "No saved prompts.";
      await navigator.clipboard.writeText(text);
      el("exportHistory").textContent = "Copied";
      setTimeout(() => {
        el("exportHistory").textContent = "Copy History";
      }, 1000);
    });

    el("copyAudit").addEventListener("click", async () => {
      const audit = loadAudit();
      const text = audit.length
        ? audit.map((item, index) => [
          `${index + 1}. ${item.title || "Untitled run"}`,
          `Trace ID: ${item.traceId || item.id || "legacy-trace"}`,
          `Outcome: ${outcomeLabel(outcomeFor(item))}`,
          `Duration: ${fmtDuration(item.elapsedMs)}`,
          `Mode: ${item.mode || "n/a"}`,
          `Route: ${item.provider || "n/a"}`,
          `Status: ${item.status || "n/a"}`,
          `Input tokens: ${item.actualInputTokens || item.rawTokens || 0}`,
          `Output tokens: ${item.actualOutputTokens || item.optimizedTokens || 0}`,
          `Estimated context reduction: ${item.savingsPercent == null ? "n/a" : item.savingsPercent + "%"}`,
          item.failureReason ? `Failure: ${item.failureReason}` : null,
          traceText(item)
        ].filter(Boolean).join("\n")).join("\n\n")
        : "No audit entries.";
      await navigator.clipboard.writeText(text);
      el("copyAudit").textContent = "Copied";
      setTimeout(() => {
        el("copyAudit").textContent = "Copy";
      }, 1000);
    });

    el("clearAudit").addEventListener("click", () => {
      if (!window.confirm("Clear the local audit log?")) return;
      saveAudit([]);
      renderAudit();
    });

    render();
  </script>
</body>
</html>
