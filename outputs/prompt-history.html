<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Token Optimizer Prompt History</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fb;
      --panel: #ffffff;
      --text: #18202f;
      --muted: #677084;
      --line: #dfe4ee;
      --brand: #2557d6;
      --brand-soft: #eaf0ff;
      --good: #0b7a4b;
      --shadow: 0 10px 30px rgba(24, 32, 47, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.4;
    }

    button,
    input {
      font: inherit;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      min-height: 58px;
      padding: 10px 24px;
      background: rgba(255, 255, 255, 0.96);
      border-bottom: 1px solid var(--line);
      box-shadow: 0 8px 24px rgba(24, 32, 47, 0.08);
      backdrop-filter: blur(12px);
    }

    .brand,
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .actions {
      justify-content: flex-end;
    }

    .logo {
      display: grid;
      width: 36px;
      height: 36px;
      place-items: center;
      border-radius: 8px;
      background: var(--brand);
      color: #ffffff;
      font-weight: 900;
    }

    .brand strong,
    .status strong {
      display: block;
      overflow: hidden;
      color: var(--text);
      font-size: 13px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .brand span,
    .status span {
      display: block;
      overflow: hidden;
      color: var(--muted);
      font-size: 12px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .page {
      width: min(1180px, calc(100% - 36px));
      margin: 0 auto;
      padding: 22px 0 44px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 16px;
      border-bottom: 1px solid var(--line);
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      font-size: 22px;
    }

    p {
      color: var(--muted);
    }

    .button,
    button {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
      font-weight: 800;
      padding: 8px 11px;
    }

    .button.active {
      border-color: var(--brand);
      background: var(--brand);
      color: #ffffff;
    }

    .history-list {
      display: grid;
      gap: 10px;
      padding: 16px;
    }

    .history-card {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      padding: 12px;
    }

    .history-card strong {
      display: block;
      font-size: 14px;
    }

    .history-card p {
      margin-top: 5px;
      font-size: 12px;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 9px;
    }

    .meta span {
      border-radius: 999px;
      padding: 4px 7px;
      background: #eef1f7;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }

    .empty {
      display: grid;
      min-height: 340px;
      place-items: center;
      text-align: center;
      color: var(--muted);
      padding: 16px;
    }

    @media (max-width: 900px) {
      .topbar,
      .history-card {
        grid-template-columns: 1fr;
      }

      .actions {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">
      <span class="logo">H</span>
      <span>
        <strong>Prompt History</strong>
        <span>Saved prompts from this browser</span>
      </span>
    </a>
    <div class="status" role="status" aria-live="polite">
      <strong id="statusTitle">History ready</strong>
      <span id="statusDetail">Load an old prompt into the optimizer, A2A kit, or agent page.</span>
    </div>
    <div class="actions" aria-label="Token optimizer pages">
      <a class="button" href="/">Optimizer</a>
      <a class="button" href="/a2a-kit">A2A Kit</a>
      <a class="button" href="/agent-structure">Agent Structure</a>
      <a class="button active" href="/prompt-history">Prompt History</a>
    </div>
  </header>

  <main class="page">
    <section class="panel">
      <div class="panel-header">
        <div>
          <h1>Past Prompts</h1>
          <p>Stored locally in this browser. Nothing here is sent to a server until you choose to run it.</p>
        </div>
        <button id="clearHistory">Clear All</button>
      </div>
      <div id="historyList" class="history-list"></div>
    </section>
  </main>

  <script>
    const historyKey = "tokenOptimizerPromptHistory";
    const providerLabels = {
      "groq-openai-fallback": "Groq + OpenAI",
      groq: "Groq",
      openai: "OpenAI",
      offline: "Offline",
      openrouter: "OpenRouter",
      xai: "xAI/Grok",
      litellm: "LiteLLM"
    };
    const platformNames = {
      codex: "Codex",
      webapp: "Web app",
      extension: "Extension",
      desktop: "Desktop",
      sdk: "SDK",
      team: "Team"
    };

    const el = (id) => document.getElementById(id);

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function loadHistory() {
      try {
        const parsed = JSON.parse(localStorage.getItem(historyKey) || "[]");
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function saveHistory(items) {
      localStorage.setItem(historyKey, JSON.stringify(items));
    }

    function title(goal) {
      const compact = String(goal || "").replace(/\s+/g, " ").trim();
      return compact.length > 88 ? compact.slice(0, 85) + "..." : compact || "Untitled prompt";
    }

    function sendPrompt(destination, item) {
      const payload = { prompt: item.goal, goal: item.goal };
      if (destination === "optimizer") {
        localStorage.setItem("tokenOptimizerLandingInput", JSON.stringify(payload));
        window.location.href = "/";
        return;
      }
      if (destination === "a2a") {
        localStorage.setItem("tokenOptimizerA2AInput", JSON.stringify(payload));
        window.location.href = "/a2a-kit";
        return;
      }
      localStorage.setItem("tokenOptimizerStructureInput", JSON.stringify({
        ...item,
        view: "agents"
      }));
      window.location.href = "/agent-structure?view=agents";
    }

    function render() {
      const history = loadHistory();
      el("statusDetail").textContent = `${history.length} saved prompt${history.length === 1 ? "" : "s"} in this browser.`;
      if (!history.length) {
        el("historyList").innerHTML = `
          <div class="empty">
            <div>
              <strong>No prompts saved yet.</strong>
              <p>Run a prompt on the optimizer page and it will appear here.</p>
            </div>
          </div>
        `;
        return;
      }
      el("historyList").innerHTML = history.map((item) => `
        <article class="history-card">
          <div>
            <strong>${escapeHtml(title(item.goal))}</strong>
            <p>${escapeHtml(item.goal)}</p>
            <div class="meta">
              <span>${escapeHtml(item.mode || "optimizer")}</span>
              <span>${escapeHtml(providerLabels[item.provider] || item.provider || "provider")}</span>
              <span>${escapeHtml(platformNames[item.platform] || item.platform || "destination")}</span>
              <span>${escapeHtml(item.depth || "medium")}</span>
              <span>${item.tokens || Math.ceil(String(item.goal || "").length / 4)} tokens</span>
              <span>${escapeHtml(new Date(item.createdAt || Date.now()).toLocaleString())}</span>
            </div>
          </div>
          <div class="actions">
            <button data-action="optimizer" data-id="${item.id}">Optimizer</button>
            <button data-action="a2a" data-id="${item.id}">A2A Kit</button>
            <button data-action="agents" data-id="${item.id}">Agents</button>
            <button data-action="delete" data-id="${item.id}">Delete</button>
          </div>
        </article>
      `).join("");
    }

    el("historyList").addEventListener("click", (event) => {
      const button = event.target.closest("button[data-action]");
      if (!button) return;
      const history = loadHistory();
      const item = history.find((entry) => entry.id === button.dataset.id);
      if (!item) return;
      if (button.dataset.action === "delete") {
        saveHistory(history.filter((entry) => entry.id !== item.id));
        render();
        return;
      }
      sendPrompt(button.dataset.action, item);
    });

    el("clearHistory").addEventListener("click", () => {
      saveHistory([]);
      render();
    });

    render();
  </script>
</body>
</html>
