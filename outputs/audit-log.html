<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Token Optimizer Audit Log</title>
  <script>document.documentElement.dataset.theme = localStorage.getItem("tokenOptimizerTheme") || "light";</script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f4;
      --panel: #ffffff;
      --text: #18202f;
      --muted: #66706b;
      --line: #dde3dc;
      --brand: #176b4d;
      --brand-soft: #e9f5ef;
      --warn: #c2572a;
      --shadow: 0 10px 30px rgba(24, 32, 47, 0.08);
    }

    :root[data-theme="dark"] {
      color-scheme: dark;
      --bg: #101411;
      --panel: #171d19;
      --text: #f3f6f1;
      --muted: #a4aea7;
      --line: #2a352d;
      --brand: #65d39f;
      --brand-soft: #153326;
      --warn: #ff9a6b;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.28);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      padding-top: 45px;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.4;
    }

    a, button { color: inherit; font: inherit; text-decoration: none; }
    h1, h2, p { margin: 0; }

    .page-nav {
      position: fixed;
      inset: 0 0 auto;
      z-index: 20;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      padding: 10px 24px;
      background: rgba(246, 247, 244, 0.96);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(12px);
    }

    .page-nav a, button {
      display: inline-flex;
      min-height: 36px;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      font-weight: 850;
      padding: 7px 11px;
    }

    .page-nav a[aria-current="page"], button.primary {
      border-color: var(--brand);
      background: var(--brand);
      color: #ffffff;
    }

    .page {
      width: min(1180px, calc(100% - 36px));
      margin: 0 auto;
      padding: 24px 0 48px;
    }

    .hero, .panel, .card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: center;
      padding: 18px;
    }

    h1 { font-size: clamp(28px, 5vw, 48px); line-height: 1; }
    .hero p { max-width: 700px; margin-top: 8px; color: var(--muted); }
    .actions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: flex-end; }

    .panel { margin-top: 16px; overflow: hidden; }
    .panel-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 16px;
      border-bottom: 1px solid var(--line);
    }

    .list {
      display: grid;
      gap: 10px;
      padding: 16px;
    }

    .card {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      padding: 14px;
      box-shadow: none;
    }

    .card strong { display: block; font-size: 14px; }
    .card p { margin-top: 5px; color: var(--muted); font-size: 13px; }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 10px;
    }

    .meta span {
      border-radius: 999px;
      padding: 4px 8px;
      background: var(--brand-soft);
      color: var(--brand);
      font-size: 11px;
      font-weight: 900;
    }

    details {
      margin-top: 10px;
      border-top: 1px solid var(--line);
      padding-top: 10px;
    }

    summary {
      cursor: pointer;
      color: var(--text);
      font-size: 13px;
      font-weight: 900;
    }

    pre {
      overflow: auto;
      max-height: 320px;
      margin: 10px 0 0;
      border-radius: 8px;
      background: #111827;
      color: #e5e7eb;
      padding: 12px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .empty {
      display: grid;
      min-height: 300px;
      place-items: center;
      color: var(--muted);
      text-align: center;
    }

    :root[data-theme="dark"] .page-nav {
      background: rgba(16, 20, 17, 0.96);
    }

    :root[data-theme="dark"] .page-nav a[aria-current="page"],
    :root[data-theme="dark"] button.primary {
      color: #08110c;
    }

    @media (max-width: 820px) {
      .hero, .card { grid-template-columns: 1fr; }
      .actions { justify-content: flex-start; }
    }
  </style>
</head>
<body>
  <nav class="page-nav" aria-label="Token optimizer pages">
    <a href="/">Home</a>
    <a href="/workspace">Workspace</a>
    <a href="/a2a-kit">Optimized IDE</a>
    <a href="/agent-structure?view=agents">Agents</a>
    <a href="/agent-structure?view=graph">Agent Graph</a>
    <a href="/prompt-history">History</a>
    <a href="/audit-log" aria-current="page">Audit Log</a>
    <a href="/settings">Settings</a>
  </nav>

  <main class="page">
    <section class="hero">
      <div>
        <h1>Audit Log</h1>
        <p>Compact run history for learning what happened: mode, route, token savings, and agent trace. It stays local in this browser.</p>
      </div>
      <div class="actions">
        <button class="primary" id="openWorkspace">Open Workspace</button>
        <button id="clearAudit">Clear Log</button>
      </div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <div>
          <h2>Recent runs</h2>
          <p id="summary">No runs yet.</p>
        </div>
      </div>
      <div class="list" id="list"></div>
    </section>
  </main>

  <script>
    const auditKey = "tokenOptimizerAuditLog";
    const list = document.getElementById("list");
    const summary = document.getElementById("summary");

    function loadAudit() {
      try {
        const parsed = JSON.parse(localStorage.getItem(auditKey) || "[]");
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function fmtDate(value) {
      const date = new Date(value);
      return Number.isNaN(date.getTime()) ? "Unknown time" : date.toLocaleString();
    }

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"]/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;"
      }[char]));
    }

    function render() {
      const items = loadAudit();
      summary.textContent = items.length ? `${items.length} saved run${items.length === 1 ? "" : "s"}` : "No runs yet.";
      if (!items.length) {
        list.innerHTML = `<div class="empty"><div><strong>No audit entries yet.</strong><p>Run something in the workspace, then come back here.</p></div></div>`;
        return;
      }
      list.innerHTML = items.map((item) => {
        const trace = item.phases?.length ? item.phases : [];
        const traceText = trace.length
          ? trace.map((step, index) => `${index + 1}. ${step.agent || "Agent"} - ${step.detail || step.phase || "Processed state."}`).join("\\n")
          : "No trace steps recorded.";
        const savings = item.savingsPercent == null ? "n/a" : item.savingsPercent + "%";
        return `
          <article class="card">
            <div>
              <strong>${escapeHtml(item.title || "Untitled run")}</strong>
              <p>${fmtDate(item.createdAt)}</p>
              <div class="meta">
                <span>${escapeHtml(item.mode || "mode")}</span>
                <span>${escapeHtml(item.provider || "route")}</span>
                <span>${escapeHtml(item.status || "status")}</span>
                <span>${item.rawTokens || 0} raw</span>
                <span>${savings} saved</span>
              </div>
              <details>
                <summary>View trace</summary>
                <pre>${escapeHtml(traceText)}</pre>
              </details>
            </div>
          </article>
        `;
      }).join("");
    }

    document.getElementById("clearAudit").addEventListener("click", () => {
      localStorage.removeItem(auditKey);
      render();
    });

    document.getElementById("openWorkspace").addEventListener("click", () => {
      window.location.href = "/workspace";
    });

    render();
  </script>
</body>
</html>
